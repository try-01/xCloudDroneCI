name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode dari repositori
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java Development Kit (JDK 17 yang direkomendasikan)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Menerima lisensi Android SDK (Opsional tapi sering dibutuhkan di CI)
      - name: Accept Android SDK Licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      # 4. Memberikan akses eksekusi dan menjalankan build.sh
      - name: Build with build.sh
        run: |
          cd TVRemote
          chmod +x build.sh
          ./build.sh

      # 5. Mengunggah hasil build (APK) agar bisa didownload dari GitHub
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: TVRemote/app/build/outputs/apk/debug/app-debug.apk
          
